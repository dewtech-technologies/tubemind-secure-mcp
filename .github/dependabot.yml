version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"
    ignore:
      # Só aceita patches automáticos — minor/major revisão manual
      - dependency-name: "*"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
